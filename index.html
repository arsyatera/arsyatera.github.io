<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

<body>
    <!-- HOME START -->

    <section class="speech">
        <h2>SAMBUTAN KETUA ANGKATAN</h2>

            </div>
            <div class="speech-image-top">

        <div class="speech-row-bottom">
            <div class="speech-image-bottom">
                <img src="liaa.png" alt="Speaker Photo">
            </div>
            <div class="speech-text-bottom">
                <h3>ARSYATERA</h3>
                <p>Lorem ipsum bla bla bla</p>
            </div>
        </div>

    <section class="tentang-arsyatera">

        <div class="tentang-arsyatera-top">
            <div class="image-tentang-arsyatera-top">
                <img src="image.png" alt="About Arsyatera">
            </div>
            <div class="text-tentang-arsyatera-top">
                <h3>ARSYATERA</h3>
                <p>Lorem ipsum bla bla bla</p>
            </div>
        </div>

        <div class="tentang-arsyatera-bottom">
            <h3>FILOSOFI LOGO</h3>
            <div class="background-logo">
                <a><img src="logo.png" alt="Logo Philosophy"></a>
            </div>
        </div>
    </section>
    <!-- TENTANG ARSYATERA END -->
    <!-- GALERY ARSYATERA START -->
    <section class="gallery">
        <!-- FOTO-FOTO (carousel sendiri) -->
        <div class="gallery-item">
            <div class="inner-carousel">
                <div class="inner-track">
                    <img src="lia.png" alt="">
                    <img src="lia.png" alt="">
                    <img src="liaa.png" alt="">
                </div>
            </div>
            <div class="gallery-text">Foto-Foto</div>
        </div>
        <!-- ITEM BIASA -->
        <div class="gallery-item">
            <img src="lia.png" alt="">
            <div class="gallery-text">After Movie</div>
        </div>
        <div class="gallery-item">
            <img src="liaa.png" alt="">
            <div class="gallery-text">OST</div>
        </div>
    </section>
    <!-- GALERY ARSYATERA END -->
    <!-- FOOTER START -->
    <footer class="footer">
        <p>2026 ARSYATERA footerrrrr</p>
